rules:
  - id: no-high-confidence-secrets
    type: regex
    description: Block obvious high-confidence secrets from staged diffs.
    pattern: '^\+.*(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----)'
    on_match: FAIL
    on_no_match: PASS

  - id: no-secret-assignments
    type: regex
    description: Block newly added secret-looking assignments with concrete values.
    pattern: '^\+.*\b(password|secret|api[_-]?key|access[_-]?token|refresh[_-]?token)\b\s*[:=]\s*["'']?[A-Za-z0-9_./+~=-]{12,}'
    on_match: FAIL
    on_no_match: PASS

  - id: no-no-verify
    type: regex
    description: Block bypassing git hooks in committed scripts or docs.
    pattern: '^\+.*git\s+commit\s+--no-verify\b'
    on_match: FAIL
    on_no_match: PASS
